name: Auto Version Bump

on:
  push:
    branches: [main]
    paths:
      - "dev-workflow/**"
      - "apple-dev/**"
      - "mactools/**"
      - "product-lens/**"
      - "skill-master/**"
      - "wechat-bridge/**"
      - "x-api/**"
      - "minimax-quota/**"
      - "netease-cloud-music/**"
      - "shared-utils/**"
      - "readback/**"
  workflow_call:
    inputs:
      plugins:
        description: "Space-separated list of plugin directory names"
        type: string
        required: true
      marketplace_tag_prefix:
        description: "Prefix for marketplace metadata tag (e.g., ops-toolkit-, personal-os-)"
        type: string
        required: true
      marketplace_path:
        description: "Path to marketplace.json"
        type: string
        required: false
        default: ".claude-plugin/marketplace.json"

permissions:
  contents: write

jobs:
  auto-version:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect changed plugins and bump versions
        id: bump
        shell: bash
        env:
          # Surface webhook-derived SHAs through env to avoid ${{ }} → run: injection patterns.
          # github.event.before is git-computed (40-char hex or zeros), not user-controllable,
          # but we follow the env-var convention as defense-in-depth.
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          # Data source discriminator: use input-presence sentinel (NOT github.event_name).
          # Inside a reusable workflow, github.event_name reflects the CALLER's trigger
          # (e.g., "push" when ops-toolkit's push triggers its caller workflow), so we
          # cannot use it to distinguish push-vs-workflow_call. Instead check if a
          # workflow_call-only input is set — empty string when triggered by indie-toolkit's
          # own push event (no inputs context), non-empty when called by a downstream caller.
          if [[ -n "${{ inputs.plugins }}" ]]; then
            # workflow_call path (downstream caller invocation)
            MARKET_FILE="${{ inputs.marketplace_path }}"
            read -ra ALL_PLUGINS <<< "${{ inputs.plugins }}"
            MARKET_TAG_PREFIX="${{ inputs.marketplace_tag_prefix }}"
          else
            # push path (indie-toolkit's own native trigger)
            MARKET_FILE=".claude-plugin/marketplace.json"
            ALL_PLUGINS=("dev-workflow" "apple-dev" "mactools" "product-lens" "skill-master" "wechat-bridge" "x-api" "minimax-quota" "netease-cloud-music" "shared-utils" "readback")
            MARKET_TAG_PREFIX="indie-toolkit-"
          fi

          bump_semver() {
            local version="$1"
            local kind="$2"
            IFS='.' read -r major minor patch <<< "$version"
            case "$kind" in
              patch) patch=$((patch + 1)) ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              major) major=$((major + 1)); minor=0; patch=0 ;;
              *) echo "Unsupported bump type: $kind" >&2; exit 1 ;;
            esac
            echo "${major}.${minor}.${patch}"
          }

          # Map bump types to numeric levels for comparison
          bump_level() {
            case "$1" in
              major) echo 3 ;;
              minor) echo 2 ;;
              patch) echo 1 ;;
              *) echo 0 ;;
            esac
          }

          # Determine bump type from conventional commit messages.
          # Input: newline-separated list of commit hashes (so we can inspect
          # subject + full body per commit, not just concatenated subjects).
          #
          # Per Conventional Commits v1.0.0, a major bump requires either:
          #   (a) subject has `type!:` or `type(scope)!:` syntax
          #   (b) a footer line beginning with `BREAKING CHANGE: ` or
          #       `BREAKING-CHANGE: ` (uppercase, line-anchored)
          # Mere mention of the words "BREAKING CHANGE" inside a subject or
          # prose body — e.g., a docs commit *describing* the syntax — must
          # NOT trigger a major bump.
          detect_bump_type() {
            local hashes="$1"
            local max_bump="patch"

            while IFS= read -r hash; do
              [[ -z "$hash" ]] && continue
              local subject body
              subject="$(git log -1 --format='%s' "$hash")"
              body="$(git log -1 --format='%B' "$hash")"

              if echo "$subject" | grep -qE '^[a-z]+(\(.+\))?!:' \
                 || echo "$body" | grep -qE '^BREAKING[ -]CHANGE: '; then
                max_bump="major"
                break
              elif echo "$subject" | grep -qE '^feat(\(.+\))?:'; then
                max_bump="minor"
              fi
            done <<< "$hashes"

            echo "$max_bump"
          }

          # Determine diff range. BEFORE_SHA (from env, sourced from github.event.before)
          # is the ref's prior tip on push events — using HEAD~1 instead silently drops
          # earlier commits in a multi-commit push, causing their plugin changes to
          # skip version bumps. Fall back to HEAD~1 when BEFORE_SHA is unavailable
          # (workflow_dispatch via workflow_call, or first push to a new branch where
          # before is all zeros).
          if [[ -z "${BEFORE_SHA:-}" || "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            DIFF_RANGE="HEAD~1..HEAD"
          else
            DIFF_RANGE="${BEFORE_SHA}..HEAD"
          fi

          # Get changed files across the entire push range (not just the last commit)
          changed_files="$(git diff --name-only "$DIFF_RANGE" 2>/dev/null || git diff --name-only HEAD)"

          # Find which plugins have changes
          changed_plugins=()
          for plugin in "${ALL_PLUGINS[@]}"; do
            if echo "$changed_files" | grep -q "^${plugin}/"; then
              changed_plugins+=("$plugin")
            fi
          done

          if [[ ${#changed_plugins[@]} -eq 0 ]]; then
            echo "No plugin directories changed. Skipping."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed plugins: ${changed_plugins[*]}"

          # Get commit hashes across the push range. Must reuse DIFF_RANGE — using
          # HEAD~1..HEAD here would only inspect the last commit's message, so a
          # `feat:` in an earlier commit of a multi-commit push would be missed and
          # the bump silently downgraded to patch.
          commit_hashes="$(git log --format='%H' "$DIFF_RANGE" 2>/dev/null || git log --format='%H' -1)"

          # Bump each changed plugin
          changed=()
          max_marketplace_bump="patch"

          for plugin in "${changed_plugins[@]}"; do
            plugin_file="${plugin}/.claude-plugin/plugin.json"

            if [[ ! -f "$plugin_file" ]]; then
              echo "Warning: $plugin_file not found, skipping"
              continue
            fi

            # Filter commit hashes whose subject mentions (${plugin}); fall back to all hashes if none match
            plugin_hashes=""
            while IFS= read -r h; do
              [[ -z "$h" ]] && continue
              if git log -1 --format='%s' "$h" | grep -qE "\(${plugin}\)"; then
                plugin_hashes+="${h}"$'\n'
              fi
            done <<< "$commit_hashes"
            [[ -z "$plugin_hashes" ]] && plugin_hashes="$commit_hashes"

            bump_type="$(detect_bump_type "$plugin_hashes")"

            current_version="$(jq -r '.version' "$plugin_file")"
            new_version="$(bump_semver "$current_version" "$bump_type")"

            echo "  $plugin: $current_version -> $new_version ($bump_type)"

            # Update plugin.json
            tmp="$(mktemp)"
            jq --arg v "$new_version" '.version = $v' "$plugin_file" > "$tmp"
            mv "$tmp" "$plugin_file"

            # Update marketplace.json plugin entry
            tmp="$(mktemp)"
            jq --arg name "$plugin" --arg v "$new_version" \
              '(.plugins[] | select(.name == $name) | .version) = $v' \
              "$MARKET_FILE" > "$tmp"
            mv "$tmp" "$MARKET_FILE"

            changed+=("${plugin}:${current_version}->${new_version}")

            # Track highest bump level for marketplace version
            if [[ $(bump_level "$bump_type") -gt $(bump_level "$max_marketplace_bump") ]]; then
              max_marketplace_bump="$bump_type"
            fi
          done

          # Bump marketplace metadata version
          market_current="$(jq -r '.metadata.version' "$MARKET_FILE")"
          market_new="$(bump_semver "$market_current" "$max_marketplace_bump")"
          tmp="$(mktemp)"
          jq --arg v "$market_new" '.metadata.version = $v' "$MARKET_FILE" > "$tmp"
          mv "$tmp" "$MARKET_FILE"
          changed+=("marketplace:${market_current}->${market_new}")

          echo "  marketplace: $market_current -> $market_new ($max_marketplace_bump)"

          # Output for downstream steps
          {
            echo "skipped=false"
            echo "tag_prefix=$MARKET_TAG_PREFIX"
            echo "changes<<EOF"
            for line in "${changed[@]}"; do
              echo "$line"
            done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Commit version bumps
        if: steps.bump.outputs.skipped != 'true'
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git add .claude-plugin/marketplace.json */.claude-plugin/plugin.json

          if git diff --cached --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore(release): auto-bump versions [skip ci]"
          git push origin HEAD:main
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Create tags
        if: steps.commit.outputs.committed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r line; do
            plugin="${line%%:*}"
            new_version="${line##*->}"

            if [[ "$plugin" == "marketplace" ]]; then
              tag="${{ steps.bump.outputs.tag_prefix }}v${new_version}"
            else
              tag="${plugin}-v${new_version}"
            fi

            git tag -a "$tag" -m "Release $tag"
            echo "Created tag: $tag"
          done <<< "${{ steps.bump.outputs.changes }}"

          git push origin --tags

      - name: Summary
        if: steps.bump.outputs.skipped != 'true'
        shell: bash
        run: |
          {
            echo "## Auto Version Bump Summary"
            echo ""
            echo "### Version Changes"
            while IFS= read -r line; do
              echo "- \`$line\`"
            done <<< "${{ steps.bump.outputs.changes }}"
          } >> "$GITHUB_STEP_SUMMARY"
